<aside class="sidebar">
  <img class="profile-photo" src="{{ "images/photo.jpg" | relURL }}" alt="Lingxiao Chen" width="170" height="170">
  <p class="author-name">{{ site.Params.author }}</p>
  <p class="author-byline">{{ site.Params.byline }}</p>
  <ul class="author-links">
    <li class="author-meta">
      <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path fill="currentColor" d="M12 2C8.13 2 5 5.13 5 8.5c0 5.25 7 13.5 7 13.5s7-8.25 7-13.5C19 5.13 15.87 2 12 2zm0 9.5a3 3 0 1 1 0-6 3 3 0 0 1 0 6z"/></svg>
      <span>{{ site.Params.location }}</span>
    </li>
    <li>
      <a href="mailto:{{ site.Params.email }}">
        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path fill="currentColor" d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4-8 5-8-5V6l8 5 8-5v2z"/></svg>
        <span>Email</span>
      </a>
    </li>
    {{ with site.Params.social.scholar }}
    <li>
      <a href="{{ . }}" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path fill="currentColor" d="M12 3 1 9l11 6 9-4.91V17h2V9L12 3zM5 13.18v4L12 21l7-3.82v-4L12 17l-7-3.82z"/></svg>
        <span>Google Scholar</span>
      </a>
    </li>
    {{ end }}
    {{ with site.Params.social.orcid }}
    <li>
      <a href="{{ . }}" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><circle cx="12" cy="12" r="10" fill="currentColor"/><text x="12" y="16" text-anchor="middle" font-size="11" font-family="Arial, sans-serif" font-weight="bold" fill="var(--color-bg)">iD</text></svg>
        <span>ORCID</span>
      </a>
    </li>
    {{ end }}
    {{ with site.Params.social.x }}
    <li>
      <a href="{{ . }}" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path fill="currentColor" d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
        <span>X</span>
      </a>
    </li>
    {{ end }}
  </ul>
</aside>
