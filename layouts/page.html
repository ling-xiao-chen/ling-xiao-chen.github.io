{{ define "main" }}
<article class="page">
  <h1 class="page-title">{{ .Title }}</h1>
  {{ .Content }}
  {{ if eq .Params.show "research" }}
    {{ partial "research-lists.html" . }}
  {{ end }}
  {{ if eq .Params.show "teaching" }}
    {{ partial "teaching-lists.html" . }}
  {{ end }}
  {{ if eq .Params.show "cv" }}
    <p class="cv-download"><a href="{{ "files/cv.pdf" | relURL }}">Download CV (PDF)</a></p>
    <object class="cv-embed" data="{{ "files/cv.pdf" | relURL }}" type="application/pdf" width="100%" height="900" aria-label="Curriculum vitae PDF">
      <p>Your browser cannot display the PDF inline. <a href="{{ "files/cv.pdf" | relURL }}">Download it here</a>.</p>
    </object>
  {{ end }}
</article>
{{ end }}
